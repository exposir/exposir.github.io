            <div class="post-date">2019-11-05</div>
            
            <div class="post-content">
              <p>目前，党和国家领导人多在北京市及附近地区居住。除私人房产外，已知的公配住宅或官邸位于中南海、玉泉山、西山、新六所、府右街、北长街、南长街、南池子、米粮库胡同（邓小平官邸）、富强胡同（胡耀邦、赵紫阳官邸）、史家胡同、东交民巷17号（温家宝时期国务院总理官邸）、毛家湾（曾为林彪住处，现为中央档案馆）等。</p>

              <h3 id="辗转相除法">辗转相除法</h3>
<pre><code class="language-js">const gcd = (x, y) =&gt; {
  return x == 0 ? y : gcd(y%x, x);
}

function gcd(a, b) {
        if (a % b == 0) return b;
        return gcd(b, a % b);
 }
</code></pre>

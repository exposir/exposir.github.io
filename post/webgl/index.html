            <h2 class="post-title">WebGl</h2>
            <div class="post-date">2019-10-15</div>
            
            <div class="post-content">
              <p>成对的方法：顶点着色器、片段着色器。  每一对组合起来称作一个program（着色程序）<br>
顶点着色器的作用是计算顶点的位置。<br>
片断着色器的作用是计算出当前绘制图元中每个像素的颜色值。</p>
<p>对于想要绘制的每一个对象，都需要先设置一系列状态值，然后通过调用 <code>gl.drawArrays</code>或 <code>gl.drawElements</code>运行一个着色方法对，使得你的着色器对能够在GPU上运行。</p>
<p>WebGL只关心两件事：裁剪空间中的坐标值和颜色值。使用WebGL只需要给它提供这两个东西。</p>
